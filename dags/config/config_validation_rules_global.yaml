# Reglas de validación para la entidad PROJ
# Ubicación: /home/airflow/gcs/dags/config/validation_rules_proj.yaml
#
# Tipos de checks disponibles sin tocar el código:
#   not_null: true/false
#   unique: true/false
#   dtype: int64, float64, str, datetime64[ns], bool
#   min_length: longitud mínima de string
#   max_length: longitud máxima de string
#   min_val: valor mínimo numérico
#   max_val: valor máximo numérico
#   regex: expresión regular que debe cumplir el valor
#   allowed_values: lista de valores permitidos

entities:

# ---------------------------------------------------------
# PROJ - Definición del Proyecto
# ---------------------------------------------------------

  - entity: PROJ
    columns:
      # ── CAMPOS CLAVE ────────────────────────────────────────────────────
      MANDT:
        not_null: true
        dtype: str
        min_length: 3
        max_length: 3
        critical: true
        # Nota: viene como int64 desde Datasphere, se pierde el cero a la izquierda
        # Valorar conversión en origen o en el DAG antes de cargar

      PSPNR:
        not_null: true
        unique: true
        dtype: str
        min_length: 8
        max_length: 8
        critical: true
        # Nota: viene como int64 desde Datasphere, se pierde el cero a la izquierda
        # Valorar conversión en origen o en el DAG antes de cargar

# ---------------------------------------------------------
# PRPS - Elemento del PEP (WBS Element)
# ---------------------------------------------------------

  - entity: PRPS
    columns:
      # ── CAMPOS CLAVE ────────────────────────────────────────────────────
      MANDT:
        not_null: true
        dtype: str
        min_length: 3
        max_length: 3
        critical: true
        # Nota: viene como int64 desde Datasphere, se pierde el cero a la izquierda
        # Valorar conversión en origen o en el DAG antes de cargar

      PSPNR:
        not_null: true
        unique: true
        dtype: str
        min_length: 8
        max_length: 8
        critical: true
        # Nota: viene como int64 desde Datasphere, se pierde el cero a la izquierda
        # Valorar conversión en origen o en el DAG antes de cargar
        
