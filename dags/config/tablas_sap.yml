
# CONFIGURACIÓN MAESTRA DE PIPELINES SAP
# ---------------------------------------

# Parámetros compartidos para no repetir en cada tabla
globals:
  project_id: "tu-proyecto-gcp"
  alert_email: "equipo_datos@empresa.com"
  bq_dataset_raw: "raw"
  bq_dataset_bronze: "bronze"
  bq_dataset_silver: "silver"
  

# Configuración global de tablas SAP
# ----------------------------------

tablas:

  proj:
    folder_path_source: "raw/sap/proj/to_be_processed/"
    folder_path_processed: "raw/sap/proj/processed/"
    folder_path_unprocessed: "raw/sap/proj/unprocessed/"
    
    # Outlets para Datasets de Airflow
    dataset_raw_outlet: "bigquery://mi-proyecto.raw.proj"
    dataset_bronze_outlet: "bigquery://mi-proyecto.bronze.proj"
    dataset_silver_outlet: "bigquery://mi-proyecto.silver.proj"
    
    # Nombres de tablas físicas
    table_raw: "proj"
    table_bronze: "proj"
    table_silver: "proj"
    
    # Tags para la interfaz de Airflow
    tags_dag_raw: ['raw', 'proj']
    tags_dag_bronze: ['bronze', 'proj']
    tags_dag_silver: ['silver', 'proj']
    
    # Selectores para Dataform
    dataform_bronze: "proj_bronze"
    dataform_silver: "proj_silver"
    
