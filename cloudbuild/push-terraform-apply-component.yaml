timeout: 5400s

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _ENV: dev
  _COMPONENT_TARGET: foundation
  _TERRAFORM_VERSION: "1.14.4"

steps:
  # Apply a single Terraform component using the trigger service account (CI=true to skip prompts).
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        ./cloudbuild/scripts/install_terraform_and_tools.sh "${_TERRAFORM_VERSION}"
        make "${_COMPONENT_TARGET}_apply" ENV="${_ENV}" CI=true
