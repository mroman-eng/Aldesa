timeout: 1800s

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _ENV: dev
  _COMPONENT_TARGET: foundation
  _COMPONENT_DIR: 10-foundation
  _TERRAFORM_VERSION: "1.14.4"
  _GITHUB_PAT_SECRET_NAME: "REQUIRED_FROM_TRIGGER"

availableSecrets:
  secretManager:
    - versionName: "projects/${PROJECT_ID}/secrets/${_GITHUB_PAT_SECRET_NAME}/versions/latest"
      env: GITHUB_PR_COMMENT_TOKEN

steps:
  # Install Terraform and helper tools in the Cloud SDK image used to run make targets.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    secretEnv:
      - GITHUB_PR_COMMENT_TOKEN
    env:
      - PR_TF_RESULT_DIR=/workspace/.cloudbuild/pr-tf
      - CB_PROJECT_ID=${PROJECT_ID}
      - CB_BUILD_ID=${BUILD_ID}
      - CB_LOCATION=${LOCATION}
      - CB_TRIGGER_NAME=${TRIGGER_NAME}
      - CB_COMMIT_SHA=${COMMIT_SHA}
      - CB_SHORT_SHA=${SHORT_SHA}
      - CB_REPO_FULL_NAME=${REPO_FULL_NAME}
      - CB_PR_NUMBER=${_PR_NUMBER}
    args:
      - -ceu
      - |
        ./cloudbuild/scripts/install_terraform_and_tools.sh "${_TERRAFORM_VERSION}"
        ./cloudbuild/scripts/pr_validate_terraform_component.sh "${_COMPONENT_TARGET}" "${_COMPONENT_DIR}" "${_ENV}"
        ./cloudbuild/scripts/render_github_pr_comment.sh
        ./cloudbuild/scripts/upsert_github_pr_comment.sh
        ./cloudbuild/scripts/finalize_pr_validation_status.sh
